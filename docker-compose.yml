services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: secai-api
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      MINIO_HOST: minio
      QDRANT_HOST: qdrant
      NEO4J_HOST: neo4j
      RULES_PATH: /app/services/api/rules.yml
      MAXMIND_DIR: /data/maxmind
      GEOIP_ENABLED: ${GEOIP_ENABLED}
      MAXMIND_CITY_DB: ${MAXMIND_CITY_DB}
      MAXMIND_ASN_DB: ${MAXMIND_ASN_DB}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      - postgres
      - minio
      - qdrant
      - neo4j
    volumes:
      - ./data:/data:ro
      - ./services/api:/app/services/api
      - ./data/maxmind:/data/maxmind:ro         # <— add this
  
    networks: [secai]

  postgres:
    image: postgres:16
    container_name: secai-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks: [secai]

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: secai-minio
    command: server --console-address ":9001" /data
    env_file: .env
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./volumes/minio:/data
    networks: [secai]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: secai-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    networks: [secai]

  neo4j:
    image: neo4j:5.22-community
    container_name: secai-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    ports:
      - "${NEO4J_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ./volumes/neo4j/data:/data
      - ./volumes/neo4j/logs:/logs
    networks: [secai]

  connector:
    build:
      context: ./services/connector
    environment:
      - API_BASE=http://api:8080
      - API_KEY=${API_KEY}
      - CONNECTOR_INTERVAL_SEC=600   # 10 min (tune as you like)
      - CONNECTOR_TENANT=acme
      - PYTHONUNBUFFERED=1
      # NVD_URL: https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=10&lastModStartDate=2025-08-15T00:00:00.000&lastModEndDate=2025-08-20T23:59:59.999
     
    volumes:
      - connector_state:/data
    depends_on:
      - api
    restart: unless-stopped
    networks: [secai] 

  feed-nvd:
    build:
      context: .
      dockerfile: services/feed_nvd/Dockerfile
    container_name: secai-feed-nvd
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      API_URL: http://api:8080
      API_KEY: ${API_KEY:-supersecret_change_me}
      NVD_API_KEY: ${NVD_API_KEY:-}
      STATE_PATH: /state/nvd_state.json
      WINDOW_HOURS: 24
      RUN_EVERY_SEC: 1800
      NVD_MARGIN_MINUTES: 180                 
    volumes:
      - ./volumes/feed-state:/state
    depends_on:
      - api
    restart: unless-stopped
    networks: [secai]

  feed-kev:
    build:
      context: .
      dockerfile: services/feed_kev/Dockerfile
    environment:
      API_URL: http://api:8080
      API_KEY: ${API_KEY}
      STATE_PATH: /state/kev_state.json
      RUN_EVERY_SEC: 3600
      MAX_RPS: 2
      # KEV_URL: override if needed
      MAX_ITEMS_PER_RUN: 100
    volumes:
      - ./state/kev:/state
    depends_on:
      - api
    restart: unless-stopped
    networks: [secai]

  worker:
    build:
      context: ./services/worker
    restart: unless-stopped
    environment:
      - API_URL=http://api:8080
      - API_KEY=${API_KEY}
      - TENANT=acme
      - WORKER_INTERVAL_SECONDS=3600
    depends_on:
      - api
    networks: [secai]

  evaluator:
    build:
      context: .
      dockerfile: services/evaluator/Dockerfile
    environment:
      API_URL: http://api:8080
      API_KEY: ${API_KEY}
      RUN_EVERY_SEC: 86400
      EVAL_SUITE: nightly
      INCLUDE_INGEST: "1"
    depends_on:
      - api
    restart: unless-stopped
    networks: [secai]

  tail-suricata:
    build:
      context: .
      dockerfile: services/tail_suricata/Dockerfile
    environment:
      API_URL: http://api:8080
      API_KEY: ${API_KEY:-supersecret_change_me}
      TENANT: acme
      EVE_PATH: /data/eve.json
    volumes:
      - ./samples/suricata:/data           # maps eve.json into the container
    depends_on:
      - api
    restart: unless-stopped
    networks: [secai]

volumes:
  connector_state:
  # connector_state:   # only if you keep connector
  
networks:
  secai:
    driver: bridge
